<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Stepper Progress Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    .demo-card {
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 600px;
    }

    .demo-controls {
      display: flex;
      justify-content: space-between;
      margin-top: 4rem;
    }

    .btn {
      padding: 0.5rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      background: #f1f5f9;
      color: #334155;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { background: #e2e8f0; }
    .btn.primary { background: #3b82f6; color: white; }
    .btn.primary:hover:not(:disabled) { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Stepper = ({ steps = [], currentStep = 1, onStepClick }) => {
      const [prevStep, setPrevStep] = useState(currentStep);

      useEffect(() => {
        if (currentStep !== prevStep) {
          const timer = setTimeout(() => setPrevStep(currentStep), 50);
          return () => clearTimeout(timer);
        }
      }, [currentStep, prevStep]);

      const calculateProgressWidth = () => {
        if (steps.length <= 1) return 0;
        const percentage = ((currentStep - 1) / (steps.length - 1)) * 100;
        return Math.max(0, Math.min(percentage, 100));
      };

      return (
        <div className="ease-stepper-container" aria-label="Progress">
          <div className="ease-stepper-track-container">
            <div className="ease-stepper-track-bg"></div>
            <div 
              className="ease-stepper-track-fill" 
              style={{ width: `${calculateProgressWidth()}%` }}
            ></div>
          </div>

          <div className="ease-stepper-nodes">
            {steps.map((label, index) => {
              const stepNumber = index + 1;
              const isCompleted = stepNumber < currentStep;
              const isActive = stepNumber === currentStep;
              
              let stateClass = '';
              if (isCompleted) stateClass = 'is-completed';
              if (isActive) stateClass = 'is-active';

              return (
                <div key={stepNumber} className={`ease-stepper-node-wrapper ${stateClass}`}>
                  <button 
                    className="ease-stepper-node"
                    onClick={() => onStepClick && onStepClick(stepNumber)}
                    aria-current={isActive ? 'step' : undefined}
                    disabled={!onStepClick}
                  >
                    {isActive && <span className="ease-stepper-pulse"></span>}
                    
                    {isCompleted ? (
                      <svg className="ease-stepper-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                      </svg>
                    ) : (
                      <span className="ease-stepper-number">{stepNumber}</span>
                    )}
                  </button>
                  <span className="ease-stepper-label">{label}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const App = () => {
      const [currentStep, setCurrentStep] = useState(2);
      const steps = ["Cart", "Shipping", "Payment", "Confirmation"];

      const handleNext = () => setCurrentStep(prev => Math.min(prev + 1, steps.length));
      const handlePrev = () => setCurrentStep(prev => Math.max(prev - 1, 1));

      return (
        <div className="demo-card">
          <h2 style={{color: '#1e293b', marginBottom: '3rem', textAlign: 'center'}}>Checkout Progress</h2>
          
          <Stepper 
            steps={steps} 
            currentStep={currentStep} 
            onStepClick={(step) => setCurrentStep(step)} 
          />
          
          <div className="demo-controls">
            <button className="btn" onClick={handlePrev} disabled={currentStep === 1}>Back</button>
            <button className="btn primary" onClick={handleNext} disabled={currentStep === steps.length}>
              {currentStep === steps.length ? 'Finish' : 'Next Step'}
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
