<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Modal Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    
    .demo-content {
      background: white;
      padding: 3rem;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    
    /* Demo specific button styles */
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 1rem;
    }
    .btn:active { transform: scale(0.95); }
    
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    
    .btn-secondary { background: #e2e8f0; color: #475569; }
    .btn-secondary:hover { background: #cbd5e1; }
    
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Modal = ({ isOpen, onClose, title, children, footer, closeOnBackdrop = true }) => {
      const [isRendered, setIsRendered] = useState(false);
      const [isAnimating, setIsAnimating] = useState(false);
      const modalRef = useRef(null);

      useEffect(() => {
        if (isOpen) {
          setIsRendered(true);
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              setIsAnimating(true);
            });
          });
        } else {
          setIsAnimating(false);
          const timer = setTimeout(() => {
            setIsRendered(false);
          }, 400); 
          return () => clearTimeout(timer);
        }
      }, [isOpen]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape' && isOpen) onClose();
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [isOpen, onClose]);

      useEffect(() => {
        if (isOpen) document.body.style.overflow = 'hidden';
        else document.body.style.overflow = '';
        return () => { document.body.style.overflow = ''; };
      }, [isOpen]);

      const handleBackdropClick = (e) => {
        if (closeOnBackdrop && e.target === e.currentTarget) onClose();
      };

      if (!isRendered) return null;

      const modalContent = (
        <div 
          className={`ease-modal-backdrop ${isAnimating ? 'is-visible' : ''}`}
          onClick={handleBackdropClick}
          aria-hidden={!isOpen}
        >
          <div className="ease-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="ease-modal-title" ref={modalRef}>
            <div className="ease-modal-header">
              <h2 id="ease-modal-title" className="ease-modal-title">{title}</h2>
              <button className="ease-modal-close-btn" onClick={onClose} aria-label="Close modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>
            
            <div className="ease-modal-body">
              {children}
            </div>

            {footer && (
              <div className="ease-modal-footer">
                {footer}
              </div>
            )}
          </div>
        </div>
      );

      // We use standard React Portals in the demo
      return ReactDOM.createPortal(modalContent, document.body);
    };

    const App = () => {
      const [isModalOpen, setIsModalOpen] = useState(false);

      const openModal = () => setIsModalOpen(true);
      const closeModal = () => setIsModalOpen(false);
      
      const handleConfirm = () => {
        console.log("Confirmed!");
        closeModal();
      };

      const modalFooter = (
        <React.Fragment>
          <button className="btn btn-secondary" onClick={closeModal}>Cancel</button>
          <button className="btn btn-danger" onClick={handleConfirm}>Delete Account</button>
        </React.Fragment>
      );

      return (
        <div className="demo-content">
          <h1 style={{color: '#1e293b', marginBottom: '1rem', marginTop: 0}}>Settings</h1>
          <p style={{color: '#64748b', marginBottom: '2rem'}}>Manage your account preferences here.</p>
          
          <button className="btn btn-danger" onClick={openModal}>
            Delete Account
          </button>
          
          <Modal 
            isOpen={isModalOpen} 
            onClose={closeModal} 
            title="Delete Account?"
            footer={modalFooter}
          >
            <p style={{ margin: '0 0 1rem 0' }}>
              Are you completely sure you want to delete your account? This action cannot be undone and you will lose all of your saved data.
            </p>
            <p style={{ margin: 0 }}>
              To confirm, please click the delete button below. Otherwise, click cancel or click outside the modal to return.
            </p>
          </Modal>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
