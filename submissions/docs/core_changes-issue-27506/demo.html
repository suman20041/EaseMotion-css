<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-fab — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#f8fafc; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-fab</h1><p>Floating action button speed dial</p></header>
<div class="ease-fab-container" id="fabDemo">
<div class="ease-fab-action" data-i="0" style="position:absolute;"><span class="ease-fab-tooltip">New Note</span><button class="ease-fab-mini">📝</button></div>
<div class="ease-fab-action" data-i="1" style="position:absolute;"><span class="ease-fab-tooltip">Take Photo</span><button class="ease-fab-mini">📸</button></div>
<div class="ease-fab-action" data-i="2" style="position:absolute;"><span class="ease-fab-tooltip">Attach File</span><button class="ease-fab-mini">📎</button></div>
<div class="ease-fab-action" data-i="3" style="position:absolute;"><span class="ease-fab-tooltip">Record Audio</span><button class="ease-fab-mini">🎤</button></div>
<button class="ease-fab-main" id="fabMain" onclick="toggleFab()"><span class="ease-fab-icon">+</span></button>
</div>
<script>
var open=false;
var actions=document.querySelectorAll('#fabDemo .ease-fab-action');
function toggleFab(){open=!open;document.getElementById('fabMain').classList.toggle('open');actions.forEach(function(a,i){if(open){a.style.transform='translateY('+(-(i+1)*60)+'px)';a.style.opacity='1';a.classList.add('visible');}else{a.style.transform='translateY(0)';a.style.opacity='0';a.classList.remove('visible');}})}
</script>
</body>
</html>
