<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skew Active Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="carousel" aria-label="Responsive Dashboard Carousel">

  <input type="radio" name="carousel" id="slide1" checked>
  <input type="radio" name="carousel" id="slide2">
  <input type="radio" name="carousel" id="slide3">

  <div class="slides">

    <article class="card card1">
      <h2>Revenue</h2>
      <p>Track sales performance with real-time dashboard metrics.</p>
    </article>

    <article class="card card2">
      <h2>Analytics</h2>
      <p>Visualize user engagement using interactive reports.</p>
    </article>

    <article class="card card3">
      <h2>Performance</h2>
      <p>Monitor application health and response times instantly.</p>
    </article>

  </div>

  <div class="controls">
    <label for="slide1"></label>
    <label for="slide2"></label>
    <label for="slide3"></label>
  </div>

</div>

</body>
</html>
