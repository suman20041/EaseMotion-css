<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Dust Particle Float Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #020617;
      --ease-color-surface:        rgba(30, 41, 59, 0.4);
      --ease-color-text:           #f8fafc;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    rgba(255, 255, 255, 0.08);
      --ease-font-sans:            system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:            0 10px 15px -3px rgba(0,0,0,0.5);
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Cosmic theme background elements */
    .space-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
      z-index: 1;
    }

    /* ── Hero Container ── */
    .hero-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 680px;
      height: 480px;
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--ease-shadow-lg);
      border-radius: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem;
      gap: 1.5rem;
    }

    .hero-content h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-content p {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto;
    }

    .cta-btn {
      background: linear-gradient(135deg, #6c63ff, #818cf8);
      color: white;
      border: none;
      padding: 0.9rem 2.25rem;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(108, 99, 255, 0.5);
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="space-bg"></div>

  <main class="hero-container">

    <!-- Ambient dust particles floating in the background -->
    <div class="dust-container-uj" style="position: absolute; inset: 0; z-index: 1;">
      <!-- Particle 1 -->
      <div class="dust-particle-uj" style="
        --dust-size: 4px;
        --dust-color: #818cf8;
        --dust-start-x: 20%;
        --dust-start-y: 20%;
        --dust-travel-x: 40px;
        --dust-travel-y: -180px;
        --dust-duration: 9s;
        --dust-delay: 0s;
        --dust-max-opacity: 0.6;
      "></div>

      <!-- Particle 2 -->
      <div class="dust-particle-uj" style="
        --dust-size: 3px;
        --dust-color: #ffffff;
        --dust-start-x: 75%;
        --dust-start-y: 15%;
        --dust-travel-x: -60px;
        --dust-travel-y: -220px;
        --dust-duration: 14s;
        --dust-delay: 2s;
        --dust-max-opacity: 0.8;
      "></div>

      <!-- Particle 3 -->
      <div class="dust-particle-uj" style="
        --dust-size: 6px;
        --dust-color: #c084fc;
        --dust-start-x: 45%;
        --dust-start-y: 5%;
        --dust-travel-x: 20px;
        --dust-travel-y: -200px;
        --dust-duration: 11s;
        --dust-delay: 4s;
        --dust-max-opacity: 0.5;
      "></div>

      <!-- Particle 4 -->
      <div class="dust-particle-uj" style="
        --dust-size: 2px;
        --dust-color: #ffffff;
        --dust-start-x: 10%;
        --dust-start-y: 40%;
        --dust-travel-x: 50px;
        --dust-travel-y: -140px;
        --dust-duration: 16s;
        --dust-delay: 1s;
        --dust-max-opacity: 0.9;
      "></div>

      <!-- Particle 5 -->
      <div class="dust-particle-uj" style="
        --dust-size: 5px;
        --dust-color: #38bdf8;
        --dust-start-x: 85%;
        --dust-start-y: 35%;
        --dust-travel-x: -30px;
        --dust-travel-y: -260px;
        --dust-duration: 12s;
        --dust-delay: 5s;
        --dust-max-opacity: 0.7;
      "></div>
    </div>

    <!-- Hero details -->
    <div class="hero-content" style="position: relative; z-index: 2;">
      <h1>Cosmic Atmosphere</h1>
      <p>
        An ambient floating dust particle background system constructed completely using native CSS keyframe timelines.
      </p>
    </div>

    <button class="cta-btn" style="position: relative; z-index: 2;">
      Initialize Probe
    </button>

  </main>

</body>
</html>
