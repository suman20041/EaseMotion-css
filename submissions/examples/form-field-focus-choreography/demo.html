<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Field Focus Choreography</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="form-card">
            <h1>Contact Form</h1>

            <form id="form">

                <div class="field">
                    <input type="text" id="name" placeholder=" " />
                    <label for="name">Full Name</label>
                    <small class="helper">Enter your complete name.</small>
                </div>

                <div class="field">
                    <input type="email" id="email" placeholder=" " />
                    <label for="email">Email Address</label>
                    <small class="helper">We'll never share your email.</small>
                </div>

                <div class="field">
                    <textarea id="message" placeholder=" " rows="4"></textarea>
                    <label for="message">Message</label>
                    <small class="helper">
                        Tell us what's on your mind.
                    </small>
                </div>

                <button type="submit">Submit</button>

                <div class="success-container" id="success">
                    <svg
                        class="checkmark"
                        viewBox="0 0 52 52"
                    >
                        <circle
                            class="checkmark-circle"
                            cx="26"
                            cy="26"
                            r="25"
                        />
                        <path
                            class="checkmark-check"
                            fill="none"
                            d="M14 27l7 7 17-17"
                        />
                    </svg>

                    <p>Form Submitted Successfully!</p>
                </div>

            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById("form");
        const success = document.getElementById("success");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            success.classList.remove("show");

            const fields = document.querySelectorAll(
                "input, textarea"
            );

            let valid = true;

            fields.forEach((field) => {
                field.classList.remove("error");

                if (!field.value.trim()) {
                    field.classList.add("error");
                    valid = false;
                }
            });

            if (valid) {
                success.classList.add("show");
                form.reset();
            }
        });
    </script>
</body>
</html>
