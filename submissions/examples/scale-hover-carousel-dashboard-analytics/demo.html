<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Analytics Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="carousel" tabindex="0" aria-label="Dashboard Analytics Carousel">

  <article class="card">
    <h3>Total Sales</h3>
    <h2>$24.8K</h2>
    <span class="change positive">▲ 12%</span>
  </article>

  <article class="card">
    <h3>Visitors</h3>
    <h2>18.4K</h2>
    <span class="change positive">▲ 8%</span>
  </article>

  <article class="card">
    <h3>Conversion</h3>
    <h2>4.7%</h2>
    <span class="change negative">▼ 1.2%</span>
  </article>

</section>

</body>
</html>
