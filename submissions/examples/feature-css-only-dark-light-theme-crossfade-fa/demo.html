<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Theme Crossfade</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <button class="theme-toggle" id="themeToggle">🌙 Toggle Theme</button>

      <section class="card">
        <div class="logo">
          <span class="light-logo">☀️</span>
          <span class="dark-logo">🌙</span>
        </div>

        <h1>Aurora Theme Crossfade</h1>

        <p>
          Smooth dark and light theme transition using CSS custom properties.
        </p>

        <div class="preview">
          <h2>EaseMotion UI</h2>

          <p>Background, surface and text tokens morph smoothly.</p>

          <button class="primary-btn">Explore</button>
        </div>
      </section>
    </main>

    <script>
      const toggle = document.getElementById("themeToggle");

      toggle.addEventListener("click", () => {
        document.documentElement.classList.toggle("dark");
      });
    </script>
  </body>
</html>
