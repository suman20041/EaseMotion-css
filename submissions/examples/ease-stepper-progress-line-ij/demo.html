<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stepper Progress Line - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Checkout</h1>
    <div class="spl-stepper" id="splStepper" style="--spl-step: 0;">
      <div class="spl-step" data-i="0">1</div>
      <div class="spl-step" data-i="1">2</div>
      <div class="spl-step" data-i="2">3</div>
      <div class="spl-step" data-i="3">4</div>
      <div class="spl-line"></div>
    </div>
    <div class="spl-controls">
      <button id="splPrev" class="spl-btn">Prev</button>
      <span class="spl-label" id="splLabel">Cart</span>
      <button id="splNext" class="spl-btn">Next</button>
    </div>
  </div>
  <script>
    var stepper = document.getElementById('splStepper');
    var label = document.getElementById('splLabel');
    var steps = ['Cart', 'Shipping', 'Payment', 'Confirm'];
    var current = 0;
    function update() {
      stepper.style.setProperty('--spl-step', current);
      label.textContent = steps[current];
    }
    document.getElementById('splPrev').addEventListener('click', function() {
      if (current > 0) { current--; update(); }
    });
    document.getElementById('splNext').addEventListener('click', function() {
      if (current < 3) { current++; update(); }
    });
  </script>
</body>
</html>
