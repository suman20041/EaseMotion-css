<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shimmering Skeleton Loader — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Skeleton Loader</h1>
    <p class="subtitle">Shimmering loading placeholders with dark mode support. Try toggling your system theme.</p>

    <h2 class="section-title">Profile Card</h2>
    <div class="demo-card">
      <div class="skeleton-profile">
        <div class="skeleton-shimmer skeleton-avatar skeleton-avatar-lg"></div>
        <div class="skeleton-profile-info">
          <div class="skeleton-shimmer skeleton-line skeleton-line-lg"></div>
          <div class="skeleton-shimmer skeleton-line skeleton-line-sm"></div>
        </div>
      </div>
    </div>

    <h2 class="section-title">Article / Text Block</h2>
    <div class="demo-card">
      <div class="skeleton-article">
        <div class="skeleton-shimmer skeleton-line skeleton-line-lg"></div>
        <div class="skeleton-shimmer skeleton-line"></div>
        <div class="skeleton-shimmer skeleton-line"></div>
        <div class="skeleton-shimmer skeleton-line skeleton-line-sm"></div>
      </div>
    </div>

    <h2 class="section-title">Card Grid</h2>
    <div class="demo-card">
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <div class="skeleton-shimmer skeleton-card" style="flex:1;min-width:180px;"></div>
        <div class="skeleton-shimmer skeleton-card" style="flex:1;min-width:180px;"></div>
        <div class="skeleton-shimmer skeleton-card skeleton-card-sm" style="flex:1;min-width:180px;"></div>
      </div>
    </div>

    <h2 class="section-title">Avatar Row</h2>
    <div class="demo-card">
      <div style="display:flex;gap:12px;align-items:center;">
        <div class="skeleton-shimmer skeleton-avatar"></div>
        <div class="skeleton-shimmer skeleton-avatar skeleton-avatar-lg"></div>
        <div class="skeleton-shimmer skeleton-avatar skeleton-avatar-sm"></div>
        <div class="skeleton-shimmer skeleton-avatar"></div>
        <div class="skeleton-shimmer skeleton-avatar skeleton-avatar-lg"></div>
      </div>
    </div>

    <h2 class="section-title">Button / Block</h2>
    <div class="demo-card">
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <div class="skeleton-shimmer skeleton-block" style="width:120px;"></div>
        <div class="skeleton-shimmer skeleton-block" style="width:160px;"></div>
        <div class="skeleton-shimmer skeleton-block" style="width:100px;"></div>
      </div>
    </div>

  </div>
</body>
</html>
