<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratospheric Solar Drone — Phase #731</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="obs-header fade-in">
    <div class="brand">
      <div class="brand-icon"></div>
      HELIOS OBSERVATORY
    </div>
    <div class="header-stat">
      <div class="stat-box">
        <span class="stat-val">21,450 m</span>
        <span class="stat-lbl">Altitude</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" style="color: var(--clr-data); text-shadow: 0 0 10px var(--clr-data)">Active</span>
        <span class="stat-lbl">Data Link</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Solar & Battery Systems -->
    <aside class="panel fade-up">
      <div class="panel-title">ENERGY SYSTEMS</div>
      
      <div class="sys-list">
        
        <div class="sys-item">
          <div class="s-hdr">
            <span class="s-name">Solar Array Input</span>
            <span class="s-val">8.4 kW</span>
          </div>
          <div class="charge-bar"><div class="c-fill" style="width: 95%;"></div></div>
        </div>

        <div class="sys-item">
          <div class="s-hdr">
            <span class="s-name">Flight Motor Draw</span>
            <span class="s-val" style="color: var(--clr-white)">2.1 kW</span>
          </div>
          <div class="charge-bar"><div class="c-fill" style="width: 30%; background: var(--clr-white)"></div></div>
        </div>

        <div class="sys-item">
          <div class="s-hdr">
            <span class="s-name">Main Battery Reserve</span>
            <span class="s-val" style="color: var(--clr-ozone)">92%</span>
          </div>
          <div class="charge-bar"><div class="c-fill" style="width: 92%; background: var(--clr-ozone); box-shadow: var(--glow-ozone)"></div></div>
        </div>

      </div>
    </aside>

    <!-- Center: Drone Telemetry View -->
    <section class="panel drone-panel fade-in delay-1" style="padding: 0; background: transparent; border: none; box-shadow: none;">
      <div class="drone-view">
        
        <!-- Hovering Drone -->
        <div class="drone-body">
          <div class="drone-core"></div>
          
          <div class="wing left"></div>
          <div class="wing right"></div>
          
          <div class="prop l1"></div>
          <div class="prop l2"></div>
          <div class="prop r1"></div>
          <div class="prop r2"></div>
        </div>

      </div>
    </section>

    <!-- Right Sidebar: Atmospheric Data -->
    <aside class="panel fade-up delay-2">
      
      <div class="weather-card">
        <div>
          <div class="wc-val">-54°C</div>
          <div class="wc-lbl">External Temp</div>
        </div>
        <div style="font-size: 2rem;">❄</div>
      </div>

      <div class="panel-title">ATMOSPHERIC DATA</div>
      
      <div class="data-grid">
        <div class="dg-item">
          <div class="dg-val">54 hPa</div>
          <div class="dg-lbl">Pressure</div>
        </div>
        <div class="dg-item">
          <div class="dg-val" style="color: var(--clr-solar)">14 UV</div>
          <div class="dg-lbl">Radiation Index</div>
        </div>
        <div class="dg-item">
          <div class="dg-val">120 km/h</div>
          <div class="dg-lbl">Wind Speed</div>
        </div>
        <div class="dg-item">
          <div class="dg-val" style="color: var(--clr-ozone)">240°</div>
          <div class="dg-lbl">Wind Vector</div>
        </div>
      </div>

    </aside>

  </main>

</body>
</html>
