<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Modal - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Zoom Modal</h1>
    <p class="desc">Modal with zoom-in animation</p>
    <button class="zm-btn" id="zmOpen">Open Modal</button>
    <div class="zm-overlay" id="zmOverlay" style="--zm-open: 0;"></div>
    <div class="zm-modal" id="zmModal" style="--zm-open: 0;">
      <div class="zm-header">
        <h2>Hello!</h2>
        <button class="zm-close" id="zmClose">&times;</button>
      </div>
      <div class="zm-body">
        <p>This modal zooms in with a scale animation from 0.85 to 1. The backdrop has a blur effect.</p>
      </div>
      <div class="zm-footer">
        <button class="zm-btn-sm" id="zmCancel">Cancel</button>
        <button class="zm-btn-sm zm-primary" id="zmConfirm">Confirm</button>
      </div>
    </div>
  </div>
  <script>
    const overlay = document.getElementById('zmOverlay');
    const modal = document.getElementById('zmModal');
    const openBtn = document.getElementById('zmOpen');
    const closeBtn = document.getElementById('zmClose');
    const cancelBtn = document.getElementById('zmCancel');
    const confirmBtn = document.getElementById('zmConfirm');

    function openModal() {
      overlay.style.setProperty('--zm-open', 1);
      modal.style.setProperty('--zm-open', 1);
    }

    function closeModal() {
      overlay.style.setProperty('--zm-open', 0);
      modal.style.setProperty('--zm-open', 0);
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', closeModal);
  </script>
</body>
</html>
