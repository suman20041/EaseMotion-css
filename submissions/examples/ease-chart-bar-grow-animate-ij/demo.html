<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Bar Grow Animate - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Chart Bar Grow Animate</h1>
    <p class="desc">Bars grow from bottom on load with staggered easing</p>
    <div class="cbg-chart" id="chart">
      <div class="cbg-bar-wrap">
        <div class="cbg-bar" data-height="85"></div>
        <span class="cbg-label">Mon</span>
      </div>
      <div class="cbg-bar-wrap">
        <div class="cbg-bar" data-height="60"></div>
        <span class="cbg-label">Tue</span>
      </div>
      <div class="cbg-bar-wrap">
        <div class="cbg-bar" data-height="92"></div>
        <span class="cbg-label">Wed</span>
      </div>
      <div class="cbg-bar-wrap">
        <div class="cbg-bar" data-height="45"></div>
        <span class="cbg-label">Thu</span>
      </div>
      <div class="cbg-bar-wrap">
        <div class="cbg-bar" data-height="78"></div>
        <span class="cbg-label">Fri</span>
      </div>
      <div class="cbg-bar-wrap">
        <div class="cbg-bar" data-height="55"></div>
        <span class="cbg-label">Sat</span>
      </div>
      <div class="cbg-bar-wrap">
        <div class="cbg-bar" data-height="70"></div>
        <span class="cbg-label">Sun</span>
      </div>
    </div>
  </div>
  <script>
    const bars = document.querySelectorAll('.cbg-bar');
    bars.forEach((bar, i) => {
      setTimeout(() => {
        bar.style.height = bar.dataset.height + '%';
      }, i * 100);
    });
  </script>
</body>
</html>
