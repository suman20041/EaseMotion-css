<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Ring Animated - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Progress Ring</h1>
    <div class="pra-ring" id="praRing" style="--pra-pct: 0;">
      <svg viewBox="0 0 120 120" class="pra-svg">
        <circle cx="60" cy="60" r="52" class="pra-bg" />
        <circle cx="60" cy="60" r="52" class="pra-fill" />
      </svg>
      <span class="pra-text" id="praText">0%</span>
    </div>
    <input type="range" min="0" max="100" value="0" id="praSlider" class="pra-slider">
  </div>
  <script>
    const ring = document.getElementById('praRing');
    const text = document.getElementById('praText');
    const slider = document.getElementById('praSlider');
    const circumference = 2 * Math.PI * 52;

    document.querySelector('.pra-fill').style.strokeDasharray = circumference;

    function updateRing(val) {
      const offset = circumference - (val / 100) * circumference;
      ring.style.setProperty('--pra-pct', val);
      document.querySelector('.pra-fill').style.strokeDashoffset = offset;
      text.textContent = Math.round(val) + '%';
    }

    slider.addEventListener('input', () => updateRing(slider.value));
    updateRing(0);
  </script>
</body>
</html>
