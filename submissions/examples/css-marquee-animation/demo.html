<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Marquee Animation Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>EaseMotion CSS – Marquee Animation Example</h2>

  <!-- Default marquee -->
  <div class="marquee">
    <span>✨ Welcome to EaseMotion CSS! Smooth scrolling text effect ✨</span>
  </div>

  <!-- Reverse direction marquee -->
  <div class="marquee reverse">
    <span>⬅️ This one scrolls the other way ⬅️</span>
  </div>

  <!-- Faster marquee -->
  <div class="marquee fast">
    <span>⚡ Speedy scrolling text ⚡</span>
  </div>
</body>
</html>
