<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recently Viewed Sections - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container-nn" id="app">
  <!-- Header Bar -->
  <header class="header-nn">
    <!-- Brand Logo -->
    <a href="#" class="brand-nn" aria-label="EaseMotion CSS Home">
      <div class="brand-icon-nn">E</div>
      <div class="brand-name-nn">EaseMotion <span>CSS</span></div>
    </a>

    <!-- Theme Switcher -->
    <button id="themeToggle" class="theme-toggle-nn" aria-label="Toggle color theme">
      <!-- Sun Icon -->
      <svg class="sun-icon-nn" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
      </svg>
      <!-- Moon Icon -->
      <svg class="moon-icon-nn" viewBox="0 0 24 24">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
      </svg>
    </button>
  </header>

  <!-- Main View Grid -->
  <div class="main-layout-nn">
    <!-- Left Navigation Sidebar -->
    <aside class="sidebar-nn" aria-label="Sidebar Menu">
      <h2 class="sidebar-title-nn">Documentation</h2>
      <ul class="sidebar-menu-nn" id="sidebarMenu">
        <!-- Will be populated dynamically -->
      </ul>
    </aside>

    <!-- Main Content Panel -->
    <main class="content-area-nn" aria-label="Main content">
      <article class="article-card-nn" id="articleView">
        <!-- Selected article content will load here -->
      </article>
    </main>

    <!-- Right History Panel -->
    <aside class="recent-panel-nn" aria-label="Recently Viewed">
      <div class="recent-header-nn">
        <h2 class="recent-title-nn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          Recently Visited
        </h2>
        <button id="clearRecentBtn" class="clear-recent-btn-nn">Clear</button>
      </div>
      <ul class="recent-list-nn" id="recentList">
        <!-- History items will load here dynamically -->
      </ul>
    </aside>
  </div>
</div>

<script>
  // 10 Documentation Sections
  const docsData = [
    {
      id: "getting-started",
      title: "Getting Started",
      category: "Guide",
      excerpt: "Learn the core concepts and design philosophies behind EaseMotion CSS.",
      content: `
        <h2>Getting Started</h2>
        <p>EaseMotion CSS is a utility-first motion framework designed to bring responsive, high-performance, and beautiful animations to your web projects without the bloat of external JavaScript runtimes.</p>
        <p>By using CSS Custom Properties and hardware-accelerated transforms, EaseMotion CSS ensures your pages remain smooth and responsive on all devices, including lower-end mobile hardware.</p>
        <div class="info-box-nn">
          <strong>Key Concept:</strong> Utility classes can be combined dynamically to create custom enter, exit, and hover motion sequences.
        </div>
      `
    },
    {
      id: "installation",
      title: "Installation",
      category: "Setup",
      excerpt: "Quickly add EaseMotion CSS to your project via npm, yarn, or CDN.",
      content: `
        <h2>Installation</h2>
        <p>Get up and running with EaseMotion CSS in under a minute using your preferred package manager or a simple HTML import.</p>
        <h3>Using npm or yarn</h3>
        <pre><code>npm install ease-motion-css\n# or\nyarn add ease-motion-css</code></pre>
        <h3>Direct HTML Link</h3>
        <pre><code>&lt;link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ease-motion-css/dist/ease.min.css"&gt;</code></pre>
      `
    },
    {
      id: "core-utilities",
      title: "Core Utilities",
      category: "Core",
      excerpt: "Explore helper classes for spacing, positioning, typography, and flexbox.",
      content: `
        <h2>Core Utilities</h2>
        <p>EaseMotion CSS includes a robust set of utility classes to handle layout, spacing, and styling without writing custom CSS.</p>
        <ul>
          <li><strong>Spacing:</strong> Margin and padding utilities on an 8px grid system.</li>
          <li><strong>Layout:</strong> Flexbox, CSS Grid, and positioning helpers.</li>
          <li><strong>Typography:</strong> Font weights, sizes, and tracking customizers.</li>
        </ul>
      `
    },
    {
      id: "hover-effects",
      title: "Hover Effects",
      category: "Motion",
      excerpt: "Add delightful interactive states to buttons, cards, and text lines.",
      content: `
        <h2>Hover Effects</h2>
        <p>Interactive elements feel premium when they respond instantly and fluidly to user touch or hover states.</p>
        <p>Apply simple utility classes to grow, tilt, overlay shimmer, or light-glow elements smoothly upon cursor entry.</p>
        <pre><code>&lt;button class="ease-hover-grow ease-hover-glow"&gt;\n  Hover Me!\n&lt;/button&gt;</code></pre>
      `
    },
    {
      id: "entrance-animations",
      title: "Entrance Animations",
      category: "Motion",
      excerpt: "Fade, slide, bounce, or scale elements into position on viewport enter.",
      content: `
        <h2>Entrance Animations</h2>
        <p>Make elements appear gracefully when the viewport loads or slides into range. Our entrance curves are heavily refined for professional business UIs.</p>
        <ul>
          <li><code>.ease-fade-in</code> - Soft fade with slight upward slide.</li>
          <li><code>.ease-slide-in-right</code> - Slide elements in from the right edge.</li>
          <li><code>.ease-scale-up</code> - Spring scaling from center.</li>
        </ul>
      `
    },
    {
      id: "keyframe-builder",
      title: "Keyframe Builder",
      category: "Tools",
      excerpt: "Generate custom keyframe rules and durations interactively.",
      content: `
        <h2>Keyframe Builder</h2>
        <p>The EaseMotion Animation Builder allows you to design custom motion curves and durations, outputting copy-pasteable utility classes instantly.</p>
        <p>Adjust variables such as velocity, friction, and delay using the builder UI, then copy the generated CSS tokens into your theme overrides.</p>
      `
    },
    {
      id: "typography",
      title: "Typography",
      category: "Core",
      excerpt: "Refine headers, lists, code samples, and inline quotes.",
      content: `
        <h2>Typography Guides</h2>
        <p>EaseMotion CSS configures native fonts with advanced legibility properties such as letter-spacing constraints and dynamic subpixel anti-aliasing.</p>
        <p>Use typography classes like <code>.ease-font-lead</code> or <code>.ease-text-balance</code> to optimize spacing and line wrap logic automatically.</p>
      `
    },
    {
      id: "dark-mode",
      title: "Dark Mode",
      category: "Theming",
      excerpt: "Leverage media queries and variables to deliver custom dark color schemes.",
      content: `
        <h2>Dark Mode Support</h2>
        <p>Color themes should adjust dynamically based on user preferences. EaseMotion CSS provides two modes of theme toggling out of the box:</p>
        <ul>
          <li><strong>System Preference:</strong> Uses CSS media queries to load dark palette variables automatically.</li>
          <li><strong>Class Override:</strong> Set the <code>.dark-theme</code> class on the html element to enforce dark colors manually.</li>
        </ul>
      `
    },
    {
      id: "layout-grids",
      title: "Layout Grids",
      category: "Core",
      excerpt: "Organize panels, headers, content structures, and cards easily.",
      content: `
        <h2>Layout Grids</h2>
        <p>Responsive multi-column grids are essential for web dashboards. Our CSS layout tokens help arrange main views, side menus, and widgets efficiently.</p>
        <p>Grids adjust fluidly, collapsing into vertical single-column feeds on smaller screens to ensure premium mobile views.</p>
      `
    },
    {
      id: "accessibility",
      title: "Accessibility",
      category: "Guide",
      excerpt: "Ensure readable contrast ratios and support prefers-reduced-motion specifications.",
      content: `
        <h2>Accessibility</h2>
        <p>Motion should never come at the cost of usability or user comfort. EaseMotion CSS conforms to accessibility standards:</p>
        <ul>
          <li><strong>Reduced Motion:</strong> Automatically disables all keyframes and transitions if <code>prefers-reduced-motion: reduce</code> is flagged by the user's OS.</li>
          <li><strong>Text Contrast:</strong> Background color values are chosen specifically to maintain WCAG AAA compliance levels across light and dark modes.</li>
        </ul>
      `
    }
  ];

  // DOM Elements
  const sidebarMenu = document.getElementById('sidebarMenu');
  const articleView = document.getElementById('articleView');
  const recentList = document.getElementById('recentList');
  const clearRecentBtn = document.getElementById('clearRecentBtn');
  const themeToggle = document.getElementById('themeToggle');
  const appRoot = document.documentElement;

  // State Management
  let recentHistory = [];

  // Theme Management
  function initTheme() {
    const savedTheme = localStorage.getItem('easemotion-theme-nn');
    if (savedTheme === 'dark') {
      appRoot.classList.add('dark-theme-nn');
      appRoot.classList.remove('light-theme-nn');
    } else if (savedTheme === 'light') {
      appRoot.classList.add('light-theme-nn');
      appRoot.classList.remove('dark-theme-nn');
    } else {
      // Respect default preferences
      appRoot.classList.remove('dark-theme-nn');
      appRoot.classList.remove('light-theme-nn');
    }
  }

  themeToggle.addEventListener('click', () => {
    const isDark = appRoot.classList.contains('dark-theme-nn') || 
                   (!appRoot.classList.contains('light-theme-nn') && window.matchMedia('(prefers-color-scheme: dark)').matches);
    
    if (isDark) {
      appRoot.classList.add('light-theme-nn');
      appRoot.classList.remove('dark-theme-nn');
      localStorage.setItem('easemotion-theme-nn', 'light');
    } else {
      appRoot.classList.add('dark-theme-nn');
      appRoot.classList.remove('light-theme-nn');
      localStorage.setItem('easemotion-theme-nn', 'dark');
    }
  });

  // History State Handlers
  function loadHistory() {
    try {
      const stored = localStorage.getItem('easemotion-recent-sections-nn');
      if (stored) {
        recentHistory = JSON.parse(stored);
      } else {
        recentHistory = [];
      }
    } catch (e) {
      recentHistory = [];
    }
  }

  function saveHistory() {
    localStorage.setItem('easemotion-recent-sections-nn', JSON.stringify(recentHistory));
  }

  function recordVisit(id) {
    // Avoid duplicate entries: remove if existing and insert at front
    recentHistory = recentHistory.filter(itemId => itemId !== id);
    recentHistory.unshift(id);

    // Keep only last 5 visited sections
    if (recentHistory.length > 5) {
      recentHistory.pop();
    }

    saveHistory();
    renderRecentPanel();
  }

  // Populate Sidebar List
  function populateSidebar() {
    sidebarMenu.innerHTML = '';
    docsData.forEach(doc => {
      const li = document.createElement('li');
      li.className = 'sidebar-item-nn';
      li.setAttribute('data-id', doc.id);
      
      const link = document.createElement('a');
      link.href = `#${doc.id}`;
      link.innerHTML = `
        <span>${doc.title}</span>
        <span style="font-size: 0.7rem; opacity: 0.6;">${doc.category}</span>
      `;

      link.addEventListener('click', (e) => {
        e.preventDefault();
        navigateToSection(doc.id);
      });

      li.appendChild(link);
      sidebarMenu.appendChild(li);
    });
  }

  // Render History Panel List
  function renderRecentPanel() {
    recentList.innerHTML = '';
    
    if (recentHistory.length === 0) {
      recentList.innerHTML = `
        <div class="recent-empty-nn">
          No recently viewed sections yet. Click sections on the sidebar to build your history list!
        </div>
      `;
      return;
    }

    recentHistory.forEach((id, index) => {
      const doc = docsData.find(item => item.id === id);
      if (!doc) return;

      const li = document.createElement('li');
      li.className = 'recent-item-nn';
      // stagger the slide in animation slightly
      li.style.animationDelay = `${index * 0.05}s`;
      li.setAttribute('data-id', doc.id);

      li.innerHTML = `
        <div class="recent-item-meta-nn">
          <span class="recent-item-title-nn">${doc.title}</span>
          <span class="recent-item-category-nn">${doc.category}</span>
        </div>
        <div class="recent-item-excerpt-nn">${doc.excerpt}</div>
      `;

      li.addEventListener('click', () => {
        navigateToSection(doc.id);
      });

      recentList.appendChild(li);
    });
  }

  // Navigate to Section
  function navigateToSection(id) {
    const doc = docsData.find(item => item.id === id);
    if (!doc) return;

    // Update active class in sidebar menu
    document.querySelectorAll('.sidebar-item-nn').forEach(li => {
      if (li.getAttribute('data-id') === id) {
        li.classList.add('active-nn');
      } else {
        li.classList.remove('active-nn');
      }
    });

    // Animate content card entrance
    articleView.style.animation = 'none';
    void articleView.offsetWidth; // Trigger layout reflow
    
    articleView.innerHTML = `
      <div class="article-meta-nn">
        <span class="article-category-nn">${doc.category}</span>
      </div>
      <h1 class="article-title-nn">${doc.title}</h1>
      <div class="article-body-nn">
        ${doc.content}
      </div>
    `;
    
    articleView.style.animation = 'articleFadeInNN 0.4s cubic-bezier(0.16, 1, 0.3, 1) both';

    // Update state & persistence
    recordVisit(id);

    // Keep address hash in sync
    history.replaceState(null, null, `#${id}`);

    // Smooth scroll main panel to top
    document.querySelector('.content-area-nn').scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Clear History Action
  clearRecentBtn.addEventListener('click', () => {
    recentHistory = [];
    saveHistory();
    renderRecentPanel();
  });

  // Handle address bar hash loading
  function handleHashRoute() {
    const hash = window.location.hash.substring(1);
    const doc = docsData.find(item => item.id === hash);
    if (doc) {
      navigateToSection(doc.id);
    } else {
      // Default to the first item (getting started)
      navigateToSection('getting-started');
    }
  }

  // Initialize App
  initTheme();
  populateSidebar();
  loadHistory();
  renderRecentPanel();
  
  // Listen to hash change manually
  window.addEventListener('hashchange', handleHashRoute);
  
  // Trigger initial route
  handleHashRoute();

</script>

</body>
</html>
