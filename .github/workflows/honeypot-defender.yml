name: Honeypot Defender

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, edited]

jobs:
  defend:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Handle Honeypot Trigger
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const HONEYPOT_ISSUE_NUMBER = 51576;

            // --- Case A: Issue Comment ---
            if (context.eventName === 'issue_comment') {
              const issueNo = context.payload.issue.number;
              const commenter = context.payload.comment.user.login;

              if (issueNo === HONEYPOT_ISSUE_NUMBER) {
                console.log(`Honeypot triggered by @${commenter} via comment on issue #${issueNo}`);
                
                // Comment warning
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNo,
                  body: `🚨 **Honeypot Triggered!** @${commenter}, you have commented on or attempted to claim a restricted security honeypot issue (#${HONEYPOT_ISSUE_NUMBER}).\n\nYour account has been flagged for automated point-farming/spam. Your claim/action is rejected, and your access will be restricted.`
                }).catch(err => console.log(err));

                // Unassign commenter
                await github.rest.issues.removeAssignees({
                  owner, repo, issue_number: issueNo,
                  assignees: [commenter]
                }).catch(() => {});

                // Make sure honeypot issue remains open so other spammers can trip it
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNo,
                  state: 'open'
                }).catch(() => {});

                // Attempt to block the spammer
                await github.rest.users.block({
                  username: commenter
                }).catch(err => console.log(`Blocking failed (probably lack of user scope): ${err.message}`));
              }
            }

            // --- Case B: Pull Request ---
            if (context.eventName === 'pull_request_target') {
              const prNo = context.payload.pull_request.number;
              const author = context.payload.pull_request.user.login;
              const body = (context.payload.pull_request.body || '').toLowerCase();
              const title = (context.payload.pull_request.title || '').toLowerCase();

              const referencesHoneypot = body.includes(`#${HONEYPOT_ISSUE_NUMBER}`) || title.includes(`${HONEYPOT_ISSUE_NUMBER}`);

              if (referencesHoneypot) {
                console.log(`Honeypot triggered by @${author} via PR #${prNo}`);

                // Comment warning on PR
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNo,
                  body: `🚨 **Honeypot Triggered!** @${author}, your Pull Request references a restricted security honeypot issue (#${HONEYPOT_ISSUE_NUMBER}).\n\nYour account has been flagged for automated point-farming/spam. This PR is being automatically closed and locked.`
                }).catch(err => console.log(err));

                // Close PR
                await github.rest.pulls.update({
                  owner, repo, pull_number: prNo,
                  state: 'closed'
                }).catch(err => console.log(err));

                // Lock PR as spam
                await github.rest.issues.lock({
                  owner, repo, issue_number: prNo,
                  lock_reason: 'spam'
                }).catch(err => console.log(err));

                // Attempt to block the spammer
                await github.rest.users.block({
                  username: author
                }).catch(err => console.log(`Blocking failed: ${err.message}`));
              }
            }
